    <template id="landing-template">

            Inspira conecta estudiantes secundarios con empresas y profesionales mediante charlas,
            talleres y encuentros elegidos segun sus intereses.
          </p>

            <button class="primary-button large" data-route="experiencias">Explorar experiencias</button>
            <button class="secondary-button large" data-route="crear-experiencia">Ofrecer una experiencia</button>
            <button class="ghost-button large" data-route="sumar-institucion">Soy institucion</button>

            <div><strong>4.500+</strong><span>estudiantes</span></div>
            <div><strong>25</strong><span>empresas aliadas</span></div>
          </div>
        </div>
        <div class="hero-product" aria-label="Vista previa de la plataforma">
          <div class="hero-image-card">
            <img
              alt="Profesional conversando con estudiantes secundarios en una experiencia vocacional"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCcTDHvgchDJSwNIZkmFwHkRC110T4E4NYQNRBAfS0z8VPH-pXg4xyKuwStCmx8e_HGiVy9uOFFNqpaxu9Bn8bdzc8GE4pwnT25Y9ADISKKbsPAYhuDCR1gHOoWKtX18dUwbV_XK3yLKBIgXSdZTMPrj7UdA0h7_c6A5_Y2YQBLxWoQT43MKrF6SBCDo2VXaNzN6aBDmxTAjiZb0aww03-_tz19bIySSqIYGC-IzI375r_V_K_Ls9unSH-eN-VwB66DnYdYGP5lJpx"

            <div>
              <strong>Experiencia abierta</strong>
              <span>Diseño UX/UI · segun interes</span>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">
          <span class="eyebrow">Como funciona</span>
          <h2>De charlas impuestas a experiencias elegidas por interes</h2>
          <p>La escuela acompaña, pero el estudiante recupera agencia sobre lo que quiere explorar.</p>
        </div>
        <div class="steps-grid">
          <article class="step-card">
            <span class="step-number">01</span>
            <h3>Empresas y profesionales publican experiencias</h3>
            <p>Charlas, talleres y visitas con cupos, modalidad, nivel y años recomendados.</p>
          </article>
          <article class="step-card">
            <span class="step-number">02</span>
            <h3>Estudiantes exploran por intereses</h3>
            <p>Tecnologia, salud, oficios, diseño, finanzas, ambiente, comunicacion y mas.</p>
          </article>
          <article class="step-card">
            <span class="step-number">03</span>
            <h3>La institucion coordina y acompaña</h3>
            <p>Habilita experiencias, reserva cupos y sigue participacion e impacto educativo.</p>
          </article>
        </div>
      </section>

      <section class="section band">
        <div class="role-grid">
          <article>
            <span class="role-icon">ES</span>
            <h3>Estudiantes</h3>
            <p>Descubren areas, se inscriben, guardan experiencias y reciben certificados.</p>
          </article>
          <article>
            <span class="role-icon">IN</span>
            <h3>Instituciones</h3>

          </article>
          <article>
            <span class="role-icon">PR</span>
            <h3>Profesionales</h3>

    <template id="onboarding-template">
      <section class="page-header">
        <span class="eyebrow">Seleccion de rol</span>
        <h1>Elegir como queres usar Inspira</h1>
        <p>El MVP se adapta al rol para mostrar solo las acciones necesarias.</p>
      </section>
      <section class="role-select-grid">
        <article class="select-card" data-route="estudiante">
          <span class="role-icon">ES</span>
          <h2>Estudiante</h2>
          <p>Explora experiencias segun tus intereses, anotate y segui tu recorrido vocacional.</p>
          <button class="primary-button">Continuar</button>
        </article>
        <article class="select-card" data-route="institucion">
          <span class="role-icon">IN</span>
          <h2>Institucion / Escuela</h2>
          <p>Habilita experiencias, coordina cupos y acompaña a tus estudiantes.</p>
          <button class="primary-button">Continuar</button>
        </article>
        <article class="select-card" data-route="profesional">
          <span class="role-icon">PR</span>
          <h2>Profesional voluntario</h2>
          <p>Ofrece charlas o talleres y usa kits para preparar encuentros simples.</p>
          <button class="primary-button">Continuar</button>
        </article>
        <article class="select-card" data-route="empresa">
          <span class="role-icon">EM</span>
          <h2>Empresa</h2>
          <p>Publica experiencias, invita empleados y mide impacto social educativo.</p>
          <button class="primary-button">Continuar</button>
        </article>
      </section>
    </template>

    <template id="experiencias-template">
      <section class="catalog-hero">
        <span class="eyebrow">Catalogo de experiencias</span>
        <h1>Descubri tu futuro profesional</h1>
        <p>Explora experiencias reales elegidas por tu interes y conecta con empresas, profesionales y estudiantes de otras instituciones.</p>
        <div class="search-shell">
          <span>⌕</span>
          <input placeholder="Que area profesional te apasiona?" />
          <button class="primary-button">Buscar</button>
        </div>
      </section>
      <section class="catalog-layout">
        <aside class="filter-panel">
          <h2>Filtros</h2>
          <label>Area
            <select id="area-filter">
              <option value="Todas">Todas</option>
              <option value="Tecnologia">Tecnologia</option>
              <option value="Diseño">Diseño</option>
              <option value="Salud">Salud</option>
              <option value="Finanzas">Finanzas</option>
              <option value="Ambiente">Ambiente</option>
            </select>
          </label>
          <label>Modalidad
            <select id="mode-filter">
              <option value="Todas">Todas</option>
              <option value="Virtual">Virtual</option>
              <option value="Presencial">Presencial</option>
              <option value="Hibrida">Hibrida</option>
            </select>
          </label>
          <label>Tipo
            <select id="type-filter">
              <option value="Todas">Todas</option>
              <option value="Interinstitucional">Interinstitucional</option>
              <option value="Compartida">Compartida</option>
              <option value="Exclusiva">Exclusiva</option>
            </select>
          </label>
          <div class="interest-list">
            <span>Tecnologia</span>
            <span>Emprendimiento</span>
            <span>Diseño UX</span>
            <span>Salud</span>
            <span>Oficios</span>
          </div>
        </aside>
        <div>
          <div class="toolbar">
            <div>
              <strong id="result-count">0 experiencias</strong>
              <span>disponibles para explorar</span>
            </div>
            <button class="secondary-button" data-route="crear-experiencia">Crear experiencia</button>
          </div>
          <div class="experience-grid" id="experience-grid"></div>
        </div>
      </section>
    </template>

    <template id="detalle-template">
      <section class="detail-page">
        <div class="detail-breadcrumb">Programas <span>›</span> Experiencias activas <span>›</span> Detalle de experiencia</div>
        <div class="detail-top">
          <div>
            <h1 id="detail-title">Detalle de experiencia</h1>
            <p><span class="inline-icon">⌾</span> Organizada por <b id="detail-host">Empresa</b> · Impacto educativo</p>
          </div>
          <div class="detail-actions">
            <span class="confirm-pill">Confirmada</span>
            <button class="secondary-button">Ver inscriptos</button>
            <button class="secondary-button">Descargar certificado</button>
          </div>
        </div>

        <div class="detail-meta-row">
          <article><span class="meta-icon blue">□</span><div><small>Fecha y hora</small><b id="detail-date">12 de junio</b></div></article>
          <article><span class="meta-icon violet">◇</span><div><small>Modalidad</small><b id="detail-mode">Virtual</b></div></article>
          <article><span class="meta-icon teal">♙</span><div><small>Tipo</small><b id="detail-type">Interinstitucional</b></div></article>
        </div>

        <section class="detail-layout">
          <div class="detail-main-column">
            <article class="panel detail-main">
              <h2><span class="section-icon">▤</span> Descripcion de la experiencia</h2>
              <p id="detail-description">Descripcion de la experiencia.</p>
              <p>Los estudiantes podran conocer roles reales, trayectorias posibles y desafios concretos de esta industria. La experiencia esta pensada para quienes se anotan por interes, no por curso obligatorio.</p>
            </article>

            <article class="panel detail-main">
              <h2><span class="section-icon">◎</span> Objetivos de aprendizaje</h2>
              <ul class="objective-list">
                <li>Identificar aplicaciones reales del area profesional y sus salidas laborales.</li>
                <li>Comprender como trabaja un equipo profesional en proyectos concretos.</li>
                <li>Explorar caminos de formacion recomendados despues de la secundaria.</li>
              </ul>
            </article>

            <article class="panel detail-main">
              <h2><span class="section-icon">◌</span> Intereses e instituciones</h2>
              <div class="interest-list" id="detail-tags"></div>
              <div class="institution-chips" id="detail-institutions"></div>
            </article>
          </div>

          <aside class="detail-sidebar">
            <article class="enrollment-card">
              <span class="status-badge green">Inscripcion abierta</span>
              <h2>Reservar mi lugar</h2>
              <p id="detail-enrollment-copy">18 de 100 cupos disponibles. Participan estudiantes de 4 instituciones.</p>
              <div class="capacity-meter">
                <span style="width: 82%"></span>
              </div>
              <div class="enrollment-steps">
                <div><b>1</b><span>Te anotas</span></div>
                <div><b>2</b><span>Tu institucion valida</span></div>
                <div><b>3</b><span>Recibis recordatorio</span></div>
              </div>
              <button class="primary-button full-button" data-route="inscripcion">Anotarme a esta experiencia</button>
              <button class="secondary-button full-button" data-route="estudiante">Guardar para despues</button>
            </article>

            <article class="kit-card">
              <div class="kit-icon">⚗</div>
              <span>Recurso premium</span>
              <h2>Kit asociado</h2>
              <p>Accede a guias, dinamicas y presentaciones listas para acompañar la experiencia.</p>
              <button class="kit-button">Ver kit asociado ↗</button>
            </article>

            <article class="venue-card">
              <div class="venue-image">
                <img id="detail-image" alt="Imagen de la experiencia" />
                <span>📍</span>
              </div>
              <div class="venue-body">
                <b>Experiencia compartida</b>
                <p id="detail-seats">Cupos disponibles</p>
                <div class="venue-actions">
                  <button>Como llegar</button>
                  <button data-route="institucion">Unirse</button>
                </div>
              </div>
            </article>

            <article class="activity-card">
              <h3>Actividad reciente</h3>
              <div class="activity-item green"><b>Experiencia confirmada</b><span>Hace 2 dias</span></div>
              <div class="activity-item blue"><b>Institucion unida</b><span>Hace 5 dias</span></div>
              <div class="activity-item gray"><b>Interes detectado</b><span>Hace 1 semana</span></div>
            </article>
          </aside>
        </section>
      </section>
    </template>
